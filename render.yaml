# Render Blueprint Configuration
# Location: Repository root (/) — required by Render Blueprint spec
# All paths are relative to repository root
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend Web Service (Docker) ──
  - type: web
    name: healthcare-backend
    env: docker
    dockerfilePath: AI-Healthcare-Agent/backend/Dockerfile
    dockerContext: AI-Healthcare-Agent/backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        value: https://healthcare-frontend.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: REDIS_URL
        value: ""
      - key: SENTRY_DSN
        value: ""
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: RATE_LIMIT_LOGIN_PER_MINUTE
        value: "10"
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: DOCUMENT_STORAGE_DIR
        value: /app/data/documents
      - key: CHROMA_PERSIST_DIR
        value: /app/data/chromadb
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1

  # ── Frontend Web Service (Docker) ──
  - type: web
    name: healthcare-frontend
    env: docker
    dockerfilePath: AI-Healthcare-Agent/frontend/Dockerfile
    dockerContext: AI-Healthcare-Agent/frontend
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://healthcare-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        value: wss://healthcare-backend.onrender.com/ws
      - key: NEXT_PUBLIC_APP_URL
        value: https://healthcare-frontend.onrender.com
      - key: NEXT_PUBLIC_ENABLE_CHAT
        value: "true"
      - key: NEXT_PUBLIC_ENABLE_EMERGENCY
        value: "true"
      - key: NEXT_PUBLIC_ENABLE_REMINDERS
        value: "true"

# Database: External Neon PostgreSQL
# Connection string set via DATABASE_URL secret (sync: false)
