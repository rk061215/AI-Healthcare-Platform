version: "3.9"

services:
  postgres:
    ports:
      - "5432:5432"

  chromadb:
    ports:
      - "8001:8000"

  backend:
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG

  frontend:
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
