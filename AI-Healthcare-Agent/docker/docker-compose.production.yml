version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthcare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare_pass}
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare_user} -d ${POSTGRES_DB:-healthcare_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - healthcare_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    container_name: healthcare-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../backend/.env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthcare_user}:${POSTGRES_PASSWORD:-healthcare_pass}@postgres:5432/${POSTGRES_DB:-healthcare_agent}
      CHROMA_HOST: ${CHROMA_HOST:-localhost}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      REDIS_URL: ${REDIS_URL:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      - uploads_data:/app/uploads
      - documents_data:/app/documents
      - backups_data:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
    networks:
      - healthcare_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
    container_name: healthcare-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ../frontend/.env.local
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_ENABLE_CHAT: "true"
      NEXT_PUBLIC_ENABLE_EMERGENCY: "true"
      NEXT_PUBLIC_ENABLE_REMINDERS: "true"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - healthcare_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  documents_data:
    driver: local
  backups_data:
    driver: local

networks:
  healthcare_network:
    driver: bridge
